<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>

    <!-- CRITICAL THEME SYNC SCRIPT (Must run before CSS loads) -->
    <script>
        (function() {
            let savedTheme = 'dark';
            try { savedTheme = localStorage.getItem('rf-theme') || 'dark'; } catch(e) {}
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyrova Admin | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0A0B0E;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(212, 175, 55, 0.2);
            --brand-gold: #D4AF37;
            --text-main: #FDFDFB;
            --text-muted: #A0A0A0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        .login-box { background: var(--panel-bg); border: 1px solid var(--border); padding: 50px 40px; border-radius: 20px; width: 100%; max-width: 450px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); backdrop-filter: blur(20px); text-align: center; }
        .login-box h1 { font-size: 2rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 40px; color: #FFF; }
        .login-box h1 span { color: var(--brand-gold); }

        .input-group { margin-bottom: 25px; text-align: left; }
        .input-group label { display: block; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; font-weight: 700; letter-spacing: 1px; }
        input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 15px; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--brand-gold); }

        .btn-login { background: linear-gradient(135deg, var(--brand-gold) 0%, #AA8A2A 100%); color: #1A1C20; border: none; padding: 16px; border-radius: 12px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s; width: 100%; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3); }

        .setup-btn { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); padding: 12px; border-radius: 12px; font-size: 0.85rem; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.3s; }
        .setup-btn:hover { border-color: rgba(255,255,255,0.3); color: #FFF; }

        #errorMsg { color: #ef4444; font-size: 0.9rem; margin-top: 20px; font-weight: 600; display: none; }
    </style>

    <!-- GLOBAL 1S THEME CROSSFADE -->
    <style>
        html, body, .main-wrapper, section, header, footer, nav, article, aside, div:not(.cursor-dot):not(.cursor-ring), h1, h2, h3, h4, h5, h6, p, span, a, button, input, textarea, label, i, svg, path, .bento-card, .process-3d-card, .founder-card {
            transition-property: background-color, background, color, border-color, box-shadow, fill, stroke !important;
            transition-duration: 1s !important;
            transition-timing-function: ease !important;
        }
        /* Ensure 3D cards and their children preserve their transform speed for physics */
        .tilt-card, .tilt-card * {
            transition-property: background-color, background, color, border-color, box-shadow, transform !important;
            transition-duration: 1s, 1s, 1s, 1s, 1s, 0.4s !important;
        }
        /* Exclude cursor and canvas from heavy transitions */
        canvas, .cursor-dot, .cursor-ring {
            transition-duration: 0.1s !important;
        }
    </style>

</head>
<body>

    <div class="login-box">
        <h1>ZYROVA <span>DIGITAL</span></h1>
        
        <form id="loginForm">
            <div class="input-group">
                <label>Admin Email</label>
                <input type="email" id="email" placeholder="Enter secure email" required autocomplete="email">
            </div>
            <div class="input-group">
                <label>Master Password</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-login" id="submitBtn">Initialize Connection</button>
        </form>

        <button class="setup-btn" onclick="setupAdmin()">1-Click Account Setup</button>
        
        <div id="errorMsg"></div>
    </div>

    <script>
        // THE BRIDGE TO YOUR NODE.JS BACKEND
        const API_URL = "http://localhost:5000/api/auth";

        function showError(msg) {
            const errDiv = document.getElementById('errorMsg');
            errDiv.style.display = 'block';
            errDiv.innerText = msg;
        }

        // --- LOGIN LOGIC ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'Authenticating...';
            btn.style.pointerEvents = 'none';
            document.getElementById('errorMsg').style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();

                if (data.success) {
                    // Save the secure token to the browser
                    localStorage.setItem('zyrova_token', data.token);
                    // Redirect to the master dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    showError(data.error || 'Invalid credentials.');
                }
            } catch (err) {
                showError('Network Error: Backend is not responding on Port 5000.');
                console.error(err);
            } finally {
                btn.innerText = 'Initialize Connection';
                btn.style.pointerEvents = 'auto';
            }
        });

        // --- SETUP LOGIC (For creating the first account from .env) ---
        async function setupAdmin() {
            try {
                const response = await fetch(`${API_URL}/setup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                
                if (data.success) {
                    alert("Master Admin created successfully! You can now log in using the credentials in your .env file.");
                } else {
                    alert(data.error || "Setup failed or admin already exists.");
                }
            } catch (err) {
                alert("Network Error: Make sure your backend terminal is running.");
            }
        }
    </script>

    <!-- UNIVERSAL THEME TOGGLE SCRIPT -->
    <script>
        function initThemeToggle() {
            const toggleDesktop = document.getElementById('themeToggleDesktop');
            const toggleMobile = document.getElementById('themeToggleMobile');

            function updateIcons(isLight) {
                const iconDesktop = document.getElementById('themeIconDesktop');
                const iconMobile = document.getElementById('themeIconMobile');
                if (iconDesktop) iconDesktop.className = isLight ? 'ri-moon-fill' : 'ri-sun-fill';
                if (iconMobile) {
                    const iTag = iconMobile.tagName && iconMobile.tagName.toLowerCase() === 'i' ? iconMobile : iconMobile.querySelector('i');
                    if(iTag) iTag.className = isLight ? 'ri-moon-fill' : 'ri-sun-fill';
                }
            }

            function toggleTheme() {
                const html = document.documentElement;
                const isCurrentlyLight = html.getAttribute('data-theme') === 'light';
                const nextTheme = isCurrentlyLight ? 'dark' : 'light';
                
                html.setAttribute('data-theme', nextTheme);
                try { localStorage.setItem('rf-theme', nextTheme); } catch(e) {}
                updateIcons(!isCurrentlyLight);
            }

            // Sync initial state safely
            let savedTheme = 'dark';
            try { savedTheme = localStorage.getItem('rf-theme') || 'dark'; } catch(e) {}
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateIcons(savedTheme === 'light');

            if(toggleDesktop) {
                toggleDesktop.replaceWith(toggleDesktop.cloneNode(true));
                document.getElementById('themeToggleDesktop').addEventListener('click', toggleTheme);
            }
            if(toggleMobile) {
                toggleMobile.replaceWith(toggleMobile.cloneNode(true));
                document.getElementById('themeToggleMobile').addEventListener('click', toggleTheme);
            }
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initThemeToggle);
        } else {
            initThemeToggle();
        }
    </script>

</body>
</html>
